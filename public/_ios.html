        window.browser = function () {
            var u = navigator.userAgent, app = navigator.appVersion;
            return {
                trident: u.indexOf('Trident') > -1, //IE内核
                presto: u.indexOf('Presto') > -1, //opera内核

            };

<script>
    function downloadItemShow(e) {
        var parentElement = e.parentElement,
            expandElement = document.querySelector('.expand'),
            detailElement = parentElement.querySelector('.download-item-detail'),
            hasNode = detailElement.classList.contains('expand');

        if(expandElement){
            expandElement.style.display='none';
            expandElement.classList.remove('expand');
            expandElement.parentElement.querySelector('.download-item-detail-button').style.display = 'block';
        }
        if(!hasNode){
            detailElement.style.display = 'flex';
            detailElement.classList.add('expand');
            parentElement.querySelector('.download-item-detail-button').style.display = 'none';
        }

        loadImg(parentElement.querySelectorAll('.download-item-image'));
        setTimeout(function () {
            parentElement.scrollIntoView(true);
        },50)
    }
    function loadImg(imgs) {
        for(i=0;i<imgs.length;i++){
            imgs[i].src=imgs[i].dataset.src;
        }
    }
